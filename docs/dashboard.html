<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First Jobs After PhD Dashboard</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #fffdf8;
      --ink: #222;
      --muted: #666;
      --grid: #ddd7ca;
      --border: #d8d2c4;
    }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--ink);
    }
    .wrap {
      max-width: 1680px;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 32px;
    }
    p.sub {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 15px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 18px 22px;
      margin-bottom: 24px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }
    .controls {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: end;
      margin-bottom: 18px;
    }
    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 280px;
    }
    .range-control {
      min-width: 220px;
    }
    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mini-control {
      margin: 8px 0 12px;
      max-width: 420px;
    }
    label {
      font-size: 13px;
      color: var(--muted);
    }
    select {
      font: 15px Georgia, "Times New Roman", serif;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      color: var(--ink);
    }
    input[type="range"] {
      width: 100%;
    }
    .range-value {
      font-size: 13px;
      color: var(--muted);
      min-width: 42px;
      text-align: right;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 14px;
    }
    .chart-box {
      position: relative;
    }
    canvas {
      width: 100%;
      height: 520px;
      display: block;
    }
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(34,34,34,0.94);
      color: white;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.35;
      opacity: 0;
      transform: translate(10px, -10px);
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    table.rank {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 8px;
    }
    table.rank th, table.rank td {
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      vertical-align: top;
    }
    table.rank th {
      text-align: left;
      color: var(--muted);
      font-weight: 600;
    }
    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 1200px) {
      .split {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>First Jobs After PhD</h1>
    <p class="sub">Interactive dashboard using the v2 classification refresh. Hover over points to see year and share.</p>

          </select>

        <div class="control">
          <label for="field-select">Field</label>
          <select id="field-select"></select>

        <div class="control range-control">
          <label for="year-start">Start year</label>
          <div class="range-row">
            <input id="year-start" type="range">
            <span id="year-start-label" class="range-value"></span>
          </div>
        </div>
        <div class="control range-control">

          <div class="range-row">
            <input id="year-end" type="range">
            <span id="year-end-label" class="range-value"></span>
          </div>
        </div>
      </div>
      <div id="chart-host"></div>
    </div>

    function renderChart(container, title, subtitle, series, opts = {}) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="title">${title}</div><div class="subtitle">${subtitle}</div>`;
      if (opts.extraControl) {
        card.appendChild(opts.extraControl);
      }
      const box = document.createElement('div');
      box.className = 'chart-box';
      const canvas = document.createElement('canvas');
      const tooltip = document.createElement('div');
      tooltip.className = 'tooltip';
      box.appendChild(canvas);
      box.appendChild(tooltip);
      card.appendChild(box);
      container.appendChild(card);

      const dpr = window.devicePixelRatio || 1;
      const width = 1500;
      const height = 520;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.height = height + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      const margin = {top: 18, right: 350, bottom: 52, left: 88};
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const yearRange = opts.yearRange || null;
      const filteredSeries = series.map((s) => ({
        ...s,
        values: s.values.filter((v) => !yearRange || (v.year >= yearRange[0] && v.year <= yearRange[1]))
      }));
      const years = [...new Set(filteredSeries.flatMap((s) => s.values.map((v) => v.year)))].sort((a, b) => a - b);
      if (!years.length) {
        const empty = document.createElement('div');
        empty.style.color = '#666';
        empty.style.padding = '12px 0 4px';
        empty.textContent = 'No data in the selected year range.';
        card.appendChild(empty);
        container.appendChild(card);
        return;
      }
      const mode = opts.mode || 'share';
      const yLabel = opts.yLabel || 'Share of first jobs';
      const rawMax = mode === 'count'
        ? Math.max(...filteredSeries.flatMap(s => s.values.map(v => v.value || 0)))
        : 0.8;
      const maxY = mode === 'count'
        ? Math.max(1000, Math.ceil(rawMax / 1000) * 1000)
        : 0.8;
      const minY = 0;
      const hoverPoints = [];

      }

        return margin.top + plotH - ((share - minY) / (maxY - minY)) * plotH;

      ctx.strokeStyle = '#ddd7ca';
      ctx.fillStyle = '#666';
      ctx.font = '12px Georgia';
      const tickStep = mode === 'count' ? Math.max(1000, Math.round(maxY / 5 / 1000) * 1000) : 0.1;
      for (let tick = 0; tick <= maxY + 1e-9; tick += tickStep) {
        const y = yPos(tick);
        ctx.beginPath();
        ctx.moveTo(margin.left, y);
        ctx.lineTo(margin.left + plotW, y);
        ctx.stroke();
        ctx.textAlign = 'right';
        ctx.fillText(mode === 'count' ? tick.toLocaleString() : Math.round(tick * 100) + '%', margin.left - 10, y + 4);
      }

      ctx.strokeStyle = '#555';
      ctx.beginPath();

          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(x, y, 3.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1.2;
          ctx.stroke();
        });
      });

      const legendX = margin.left + plotW + 30;
      const legendY = margin.top + 10;
      ctx.textAlign = 'left';
      ctx.font = '12px Georgia';
      filteredSeries.forEach((s, idx) => {
        const y = legendY + idx * 24;
        ctx.fillStyle = s.color;
        ctx.fillRect(legendX, y - 10, 16, 16);
        ctx.fillStyle = '#222';
        ctx.fillText(s.label, legendX + 24, y + 3);
      });

      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        let best = null;
        let bestDist = 12;
        for (const p of hoverPoints) {
          const d = Math.hypot(mx - p.x, my - p.y);
          if (d < bestDist) {
            bestDist = d;
            best = p;
          }
        }
        if (best) {
          tooltip.style.opacity = '1';
          tooltip.style.left = (best.x + 12) + 'px';
          tooltip.style.top = (best.y - 12) + 'px';
          tooltip.innerHTML = mode === 'count'
            ? `<strong>${best.label}</strong><br>Graduation year: ${best.year}<br>Graduates: ${(best.value || 0).toLocaleString()}`
            : `<strong>${best.label}</strong><br>Graduation year: ${best.year}<br>Share: ${(best.share * 100).toFixed(1)}%`;
        } else {
          tooltip.style.opacity = '0';
        }
      });
      canvas.addEventListener('mouseleave', () => {
        tooltip.style.opacity = '0';
      });
    }

    function renderTopOrgs(container, fieldName, items) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="title">Top 10 Organizations: ${fieldName}</div><div class="subtitle">Largest organizations in the matched first-job file for the selected field. No time split.</div>`;
      const table = document.createElement('table');
      table.className = 'rank';
      table.innerHTML = '<thead><tr><th style="width:50px;">Rank</th><th>Organization</th><th style="width:90px;">Count</th></tr></thead>';
      const tbody = document.createElement('tbody');
      (items || []).forEach((item, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${idx + 1}</td><td>${item.name}</td><td>${Number(item.count).toLocaleString()}</td>`;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      card.appendChild(table);
      container.appendChild(card);
    }

    const viewSelect = document.getElementById('view-select');
    const fieldSelect = document.getElementById('field-select');
    const yearStart = document.getElementById('year-start');
    const yearEnd = document.getElementById('year-end');
    const yearStartLabel = document.getElementById('year-start-label');
    const yearEndLabel = document.getElementById('year-end-label');
    const host = document.getElementById('chart-host');
    const allYears = [
      ...new Set([
        ...DATA.overall.series.flatMap((s) => s.values.map((v) => v.year)),
        ...DATA.overall_field_counts.series.flatMap((s) => s.values.map((v) => v.year)),
        ...DATA.broad_fields.flatMap((f) => f.series.flatMap((s) => s.values.map((v) => v.year))),
        ...DATA.major_fields.flatMap((f) => f.series.flatMap((s) => s.values.map((v) => v.year))),
        ...DATA.overall_sed_comparison.fields.flatMap((f) => f.series.flatMap((s) => s.values.map((v) => v.year)))
      ])
    ].sort((a, b) => a - b);
    const minYear = allYears[0];
    const maxYear = allYears[allYears.length - 1];
    yearStart.min = minYear;
    yearStart.max = maxYear;
    yearEnd.min = minYear;
    yearEnd.max = maxYear;
    yearStart.value = minYear;
    yearEnd.value = maxYear;

    function syncYearLabels() {
      yearStartLabel.textContent = yearStart.value;
      yearEndLabel.textContent = yearEnd.value;
    }

    function currentYearRange() {
      let start = Number(yearStart.value);
      let end = Number(yearEnd.value);
      if (start > end) [start, end] = [end, start];
      return [start, end];
    }

    function currentCollection() {
      if (viewSelect.value === 'broad') return DATA.broad_fields;
      if (viewSelect.value === 'major') return DATA.major_fields;
      return [];
    }

    function refreshFieldOptions() {
      fieldSelect.innerHTML = '';
      if (viewSelect.value === 'overall') {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'Overall sample';
        fieldSelect.appendChild(opt);
        fieldSelect.disabled = true;
        return;
      }
      fieldSelect.disabled = false;
      currentCollection().forEach((item) => {
        const opt = document.createElement('option');
        opt.value = item.slug;
        opt.textContent = item.field;
        fieldSelect.appendChild(opt);
      });
    }

    function renderCurrent() {
      host.innerHTML = '';
      if (viewSelect.value === 'overall') {
        renderChart(
          host,
          DATA.overall.title,
          'Shares of first observed post-PhD jobs. Government combines agencies and labs; academia is universities only.',
          DATA.overall.series,
          { mode: 'share', yLabel: 'Share of first jobs', yearRange: currentYearRange() }
        );
        renderChart(
          host,
          DATA.overall_field_counts.title,
          'Counts of graduates in the matched file by graduation year across NSF broad fields.',
          DATA.overall_field_counts.series,
          { mode: 'count', yLabel: 'Graduates in matched file', yearRange: currentYearRange() }
        );
        const compareWrap = document.createElement('div');
        compareWrap.className = 'mini-control';
        const compareLabel = document.createElement('label');
        compareLabel.textContent = 'Broad field for matched-vs-SED comparison';
        const compareSelect = document.createElement('select');
        DATA.overall_sed_comparison.fields.forEach((item) => {
          const opt = document.createElement('option');
          opt.value = item.slug;
          opt.textContent = item.field;
          compareSelect.appendChild(opt);
        });
        compareWrap.appendChild(compareLabel);
        compareWrap.appendChild(compareSelect);
        const renderComparison = () => {
          const existing = host.querySelector('[data-compare-chart="true"]');
          if (existing) existing.remove();
          const item = DATA.overall_sed_comparison.fields.find((x) => x.slug === compareSelect.value) || DATA.overall_sed_comparison.fields[0];
          if (!item) return;
          const temp = document.createElement('div');
          temp.dataset.compareChart = 'true';
          host.appendChild(temp);
          renderChart(
            temp,
            `${DATA.overall_sed_comparison.title}: ${item.field}`,
            'Solid blue line is the matched file; red line is the official NCSES SED count. This comparison is restricted to 2014–2020.',
            item.series,
            { mode: 'count', yLabel: 'Graduates', extraControl: compareWrap, yearRange: currentYearRange() }
          );
        };
        compareSelect.addEventListener('change', renderComparison);
        renderComparison();
        return;
      }
      const selected = currentCollection().find((item) => item.slug === fieldSelect.value) || currentCollection()[0];
      if (!selected) return;
      const fieldType = viewSelect.value === 'broad' ? 'NSF broad field' : 'NSF major field';
      const split = document.createElement('div');
      split.className = 'split';
      const left = document.createElement('div');
      const right = document.createElement('div');
      split.appendChild(left);
      split.appendChild(right);
      host.appendChild(split);
      renderChart(
        left,
        `First-Job Sector Trends: ${selected.field}`,
        `Shares of first observed post-PhD jobs by graduation cohort within this ${fieldType}.`,
        selected.series,
        { mode: 'share', yLabel: 'Share of first jobs', yearRange: currentYearRange() }
      );
      renderTopOrgs(right, selected.field, selected.top_orgs || []);
    }

    viewSelect.addEventListener('change', () => {
      refreshFieldOptions();
      renderCurrent();
    });
    fieldSelect.addEventListener('change', renderCurrent);
    yearStart.addEventListener('input', () => {
      if (Number(yearStart.value) > Number(yearEnd.value)) yearEnd.value = yearStart.value;
      syncYearLabels();
      renderCurrent();
    });
    yearEnd.addEventListener('input', () => {
      if (Number(yearEnd.value) < Number(yearStart.value)) yearStart.value = yearEnd.value;
      syncYearLabels();
      renderCurrent();
    });

    syncYearLabels();
    refreshFieldOptions();
    renderCurrent();
  </script>
</body>
</html>
